# Turns every mirrored tag into a GitHub Release. Tags are pushed by the
# mirror-client workflow in zylos-ai/zylos-rounds over a deploy key, which
# can push refs but cannot create Release objects — so this repo creates
# its own. Deploy-key pushes do trigger workflows (unlike GITHUB_TOKEN pushes).
name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists"; exit 0
          fi
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Mirrored client release from [zylos-ai/zylos-rounds](https://github.com/zylos-ai/zylos-rounds) $GITHUB_REF_NAME — install with \`zylos add rounds-client\`. Changes: see the [main repo changelog](https://github.com/zylos-ai/zylos-rounds/blob/main/CHANGELOG.md)."
